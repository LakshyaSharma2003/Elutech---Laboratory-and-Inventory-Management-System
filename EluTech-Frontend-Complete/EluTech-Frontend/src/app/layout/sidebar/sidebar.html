<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">⬡</div>
    <div class="logo-text">
      <h2>ELUTECH</h2>
      <p>LIMS Platform</p>
    </div>
  </div>

  <nav>
    <a
      *ngFor="let item of menus()"
      class="menu-item"
      lgInteractive
      [routerLink]="item.route"
      routerLinkActive="active"
    >
      <span class="icon">{{item.icon}}</span>
      <span class="label">{{item.title}}</span>
      <!-- Notification badge -->
      <span class="notif-badge"
        *ngIf="item.badge && badge.unreadCount() > 0">
        {{badge.unreadCount() > 99 ? '99+' : badge.unreadCount()}}
      </span>
      <span class="active-indicator"></span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="theme-preview">
      <span class="theme-dot" *ngFor="let c of theme.getCurrentThemeObj().preview"
        [style.background]="c"></span>
      <span class="theme-name">{{theme.getCurrentThemeObj().name}}</span>
    </div>
  </div>
</div>
